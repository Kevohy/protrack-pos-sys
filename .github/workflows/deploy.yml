name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          # DATABASE_URL needed only if Next.js queries DB at build time
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # NEXTAUTH_URL and NEXTAUTH_SECRET are runtime-only — not needed here
          NEXTAUTH_URL: "http://localhost:3000"
          NEXTAUTH_SECRET: "build-placeholder-not-used-at-runtime"

      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/pos-saas
            git pull origin main
            npm ci
            npx prisma db push
            npx prisma generate
            npm run build
            pm2 restart pos-saas || pm2 start ecosystem.config.js
